server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    keepalive_timeout 65;

    # Cloud Run terminates TLS; honor the original scheme
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Prefer apex (matches canonical URL)
    if ($host = www.arronhyman.com) {
        return 301 https://arronhyman.com$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
