name: Deploy arronhyman.com

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-west1
  REPO_NAME: arron-hyman
  SERVICE_NAME: arron-hyman

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-west1-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repo
        run: |
          gcloud artifacts repositories describe "$REPO_NAME" \
            --location="$REGION" \
            --project="$PROJECT_ID" >/dev/null 2>&1 \
          || gcloud artifacts repositories create "$REPO_NAME" \
            --repository-format=docker \
            --location="$REGION" \
            --project="$PROJECT_ID" \
            --description="Arron Hyman personal site"

      - name: Build and push
        run: |
          IMAGE_URI="us-west1-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME"
          VERSION_TAG="${{ steps.version.outputs.VERSION }}"
          docker build -t "$IMAGE_URI:$VERSION_TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$VERSION_TAG"
          docker push "$IMAGE_URI:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          image: us-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ steps.version.outputs.VERSION }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --cpu-boost

      - name: Post-deploy health check
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --format='value(status.url)')
          echo "Service URL: $URL"
          HEALTHY=false
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/healthz" --max-time 20 || echo "000")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              HEALTHY=true
              break
            fi
            sleep 8
          done
          if [ "$HEALTHY" != "true" ]; then
            echo "Health check failed"
            exit 1
          fi
          echo "Live at $URL"
